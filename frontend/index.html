<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Club Nepali Calendar</title>
    <!-- Google Fonts for Material Design Look -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-bar">
        <div class="logo-placeholder" title="Replace 'logo.jpg' in the frontend folder with your actual logo!">
            <img src="logo.jpg" alt="IT Club Logo" id="club-logo" onload="this.style.display='block'; this.nextElementSibling.style.display='none';" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
            <div class="logo-fallback"><i class="material-icons">event</i></div>
        </div>
        <h1 class="app-title">IT Club Calendar</h1>
        <div class="header-actions">
            <button id="todayBtn" class="md-button text-button">TODAY</button>
        </div>
    </header>

    <main class="container">
        <div class="calendar-card">
            <!-- Calendar Navigation -->
            <div class="calendar-nav">
                <button id="prevBtn" class="icon-button"><i class="material-icons">chevron_left</i></button>
                <h2 id="monthTitle" class="month-title">Loading...</h2>
                <button id="nextBtn" class="icon-button"><i class="material-icons">chevron_right</i></button>
            </div>

            <!-- Calendar Days Header -->
            <div class="calendar-header-days">
                <span>Sun</span>
                <span>Mon</span>
                <span>Tue</span>
                <span>Wed</span>
                <span>Thu</span>
                <span>Fri</span>
                <span>Sat</span>
            </div>

            <!-- Calendar Grid -->
            <div id="calendarGrid" class="calendar-grid">
                <!-- Days will be generated by JS -->
            </div>
        </div>

        <!-- Event Details List -->
        <div class="events-card">
            <h3 class="events-title"><i class="material-icons">list</i> Events This Month</h3>
            <ul id="eventList" class="event-list">
                <!-- Events generate here -->
            </ul>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
